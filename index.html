<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAIDO TRAINER</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    width:90%;
    max-width:500px;
}

h1{
    font-size:36px;
    margin-bottom:20px;
}

/* ★ ラベルと入力欄の見た目を微調整 */
.input-group {
    margin: 15px 0;
    font-size: 18px;
}

input{
    width:80px;
    font-size:20px;
    text-align:center;
    margin-left: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    padding: 5px;
}

select{
    font-size:20px;
    border-radius:6px;
    padding:5px;
}

button{
    margin:10px;
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:12px;
}

.start{ background:#00c853; color:white; }
.stop{ background:#d50000; color:white; }

#msg{
    margin-top:40px;
    font-size:70px;
    font-weight:bold;
}
</style>

</head>

<body>

<audio id="whistleAudio" src="笛1.mp3" preload="auto"></audio>

<div class="container">

<h1>🥋 TAIDO TRAINER</h1>

<!-- ★ 最小・最大のテキスト表記を追加しました -->
<div class="input-group">
    <label>最小：<input id="min" type="number" value="2" min="0.5" max="30" step="0.5"> 秒</label>
</div>

<div class="input-group">
    <label>最大：<input id="max" type="number" value="6" min="0.5" max="30" step="0.5"> 秒</label>
</div>

<div class="input-group">
    <label>
        モード：
        <select id="mode" onchange="toggleCountInput()">
            <option value="count">回数指定</option>
            <option value="infinite">無限</option>
        </select>
    </label>
</div>

<div class="input-group" id="countGroup">
    <label>
        回数：
      <input id="count" type="number" value="10" min="1" max="500">
        回
    </label>
</div>

<button class="start" onclick="start()">START</button>
<button class="stop" onclick="stop()">STOP</button>

<div id="error"
     style="color:#ff5252; font-size:18px; margin-top:10px; min-height:24px;">
</div>

<div id="msg">構え</div>

</div>

<script>

let running=false;
let timer;
let whistleSound;

function initAudio(){
    if(!whistleSound){
        whistleSound = document.getElementById("whistleAudio");
    }
    whistleSound.load();
}

function playWhistle(){
    if(!whistleSound){
        initAudio();
    }
    whistleSound.currentTime = 0;
    whistleSound.play().catch(e => {
        console.log("オーディオ再生エラー:", e);
    });
}


function loop(){

    if(!running) return;

    const min = parseFloat(document.getElementById("min").value);
    const max = parseFloat(document.getElementById("max").value);

    const wait = (Math.random()*(max-min)+min)*1000;

    timer = setTimeout(()=>{

        playWhistle();

        document.getElementById("msg").innerText = "GO！";

        setTimeout(()=>{
            document.getElementById("msg").innerText = "構え";
        },600);

        loop();

    }, wait);
}

function start(){

    const error = document.getElementById("error");
    error.innerText = "";

    const min = parseFloat(document.getElementById("min").value);
    const max = parseFloat(document.getElementById("max").value);

    if (isNaN(min) || isNaN(max)) {
        error.innerText = "エラー：最小値・最大値を入力してください。";
        return;
    }

    if (min <= 0 || max <= 0) {
        error.innerText = "エラー：0より大きい値を入力してください。";
        return;
    }

    if (min > max) {
        error.innerText = "エラー：最小値は最大値以下にしてください。";
        return;
    }

    if(running) return;

    initAudio();

    running = true;
    document.getElementById("msg").innerText = "開始";
    loop();
}

function stop(){

    running = false;
    clearTimeout(timer);

    document.getElementById("msg").innerText = "停止";
    document.getElementById("error").innerText = "";
}

function toggleCountInput(){

    const mode = document.getElementById("mode").value;

    document.getElementById("countGroup").style.display =
        mode === "count" ? "block" : "none";
}

toggleCountInput();

</script>

</body>
</html>
