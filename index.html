<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAIDO TRAINER</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    width:90%;
    max-width:500px;
}

h1{
    font-size:36px;
    margin-bottom:20px;
}

input{
    width:80px;
    font-size:20px;
    text-align:center;
}

button{
    margin:10px;
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:12px;
}

.start{ background:#00c853; color:white; }
.stop{ background:#d50000; color:white; }

#msg{
    margin-top:40px;
    font-size:70px;
    font-weight:bold;
}
</style>

</head>

<body>

<!-- ★ ホイッスル音のオーディオ要素を追加 -->
<audio id="whistleAudio" src="笛1.mp3" preload="auto"></audio>

<div class="container">

<h1>🥋 TAIDO TRAINER</h1>

<p>
<input id="min" type="number" value="2" min="0.5" max="30" step="0.5">
</p>

<p>
<input id="max" type="number" value="6" min="0.5" max="30" step="0.5">
</p>

<button class="start" onclick="start()">START</button>
<button class="stop" onclick="stop()">STOP</button>

<div id="error"
     style="color:#ff5252; font-size:18px; margin-top:10px; min-height:24px;">
</div>

<div id="msg">待機中</div>

</div>

<script>

let running=false;
let timer;
let whistleSound;

// ★ iPhone対策：最初のタップで音声を読み込んで準備する
function initAudio(){
    if(!whistleSound){
        whistleSound = document.getElementById("whistleAudio");
    }
    // 空再生、またはload()を呼ぶことでスマホの音再生制限を解除します
    whistleSound.load();
}

// ★ ホイッスル音を再生する関数に変更
function playWhistle(){
    if(!whistleSound){
        initAudio();
    }
    // 再生位置を先頭に戻してから再生（連続で鳴っても大丈夫なように）
    whistleSound.currentTime = 0;
    whistleSound.play().catch(e => {
        console.log("オーディオ再生エラー:", e);
    });
}


function loop(){

    if(!running) return;

    const min = parseFloat(document.getElementById("min").value);
    const max = parseFloat(document.getElementById("max").value);

    const wait = (Math.random()*(max-min)+min)*1000;

    timer = setTimeout(()=>{

        // ★ 電子音の代わりにホイッスルを鳴らす
        playWhistle();

        document.getElementById("msg").innerText = "⚡ 技！";

        setTimeout(()=>{
            document.getElementById("msg").innerText = "待機中";
        },600);

        loop();

    }, wait);
}

function start(){

    const error = document.getElementById("error");
    error.innerText = "";

    const min = parseFloat(document.getElementById("min").value);
    const max = parseFloat(document.getElementById("max").value);

    if (isNaN(min) || isNaN(max)) {
        error.innerText = "エラー：最小値・最大値を入力してください。";
        return;
    }

    if (min <= 0 || max <= 0) {
        error.innerText = "エラー：0より大きい値を入力してください。";
        return;
    }

    if (min > max) {
        error.innerText = "エラー：最小値は最大値以下にしてください。";
        return;
    }

    if(running) return;

    // STARTボタンを押した瞬間にスマホの音声制限を解除
    initAudio();

    running = true;
    document.getElementById("msg").innerText = "開始";
    loop();
}

function stop(){

    running = false;
    clearTimeout(timer);

    document.getElementById("msg").innerText = "停止";
    document.getElementById("error").innerText = "";
}

</script>

</body>
</html>
